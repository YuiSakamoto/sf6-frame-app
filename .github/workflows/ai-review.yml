name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      models: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        id: diff
        run: |
          DIFF=$(git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} -- '*.ts' '*.tsx' ':!pnpm-lock.yaml')
          # GitHub Actions output の上限を考慮して切り詰め
          DIFF="${DIFF:0:60000}"
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "diff<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: AI Review
        id: review
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          system-prompt: |
            あなたはコードレビュアーです。PR の差分を分析し、日本語でレビューしてください。
            以下の観点でレビューしてください：
            - バグや論理的な問題
            - TypeScript の型安全性
            - セキュリティ上の懸念
            - パフォーマンスの問題
            問題がなければ「LGTM」と返してください。
            マークダウン形式で出力してください。
          prompt: |
            以下の PR の差分をレビューしてください：

            ${{ steps.diff.outputs.diff }}

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const response = `${{ steps.review.outputs.response }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## AI Code Review\n\n${response}\n\n---\n*Reviewed by GitHub AI Inference (GPT-4o)*`
            });
